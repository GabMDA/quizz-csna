<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM CSNA Stormshield v4.x – Révision complète</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap');

:root {
  --bg: #0c0f14;
  --surface: #151921;
  --surface2: #1c2230;
  --border: #2a3142;
  --text: #e2e6ef;
  --text-dim: #8892a6;
  --accent: #4a9eff;
  --accent2: #6c5ce7;
  --green: #00d68f;
  --red: #ff6b6b;
  --orange: #ffa94d;
  --yellow: #ffd43b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #1a1f2e 0%, #0c0f14 50%, #141825 100%);
  border-bottom: 1px solid var(--border);
  padding: 1.2rem 2rem;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header h1 {
  font-size: 1.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.header .subtitle {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 0.3rem;
}

.score-bar {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  margin-top: 0.8rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
}

.score-bar span { color: var(--text-dim); }
.score-bar .correct { color: var(--green); }
.score-bar .wrong { color: var(--red); }
.score-bar .total { color: var(--accent); }

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.5rem;
}

.nav-sections {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 2rem;
  padding: 1rem;
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.nav-btn {
  padding: 0.4rem 0.8rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Outfit', sans-serif;
}

.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.section-block {
  margin-bottom: 2.5rem;
  display: none;
}

.section-block.visible { display: block; }

.section-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 0.3rem;
  padding-left: 1rem;
  border-left: 3px solid var(--accent);
}

.subsection-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent2);
  margin: 1.5rem 0 0.8rem;
  padding-left: 1rem;
  border-left: 2px solid var(--accent2);
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem;
  margin-bottom: 1rem;
  transition: border-color 0.3s;
}

.question-card.answered-correct { border-color: var(--green); }
.question-card.answered-wrong { border-color: var(--red); }

.q-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}

.q-text {
  font-size: 0.92rem;
  font-weight: 500;
  margin-bottom: 0.8rem;
  line-height: 1.5;
}

.options { display: flex; flex-direction: column; gap: 0.4rem; }

.option {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.6rem 0.8rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.85rem;
}

.option:hover { border-color: var(--accent); background: rgba(74,158,255,0.06); }
.option.selected { border-color: var(--accent); background: rgba(74,158,255,0.1); }
.option.correct-answer { border-color: var(--green); background: rgba(0,214,143,0.1); }
.option.wrong-answer { border-color: var(--red); background: rgba(255,107,107,0.1); }
.option.disabled { pointer-events: none; opacity: 0.7; }
.option.disabled.correct-answer { opacity: 1; }

.option-letter {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.75rem;
  min-width: 1.4rem;
  height: 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  background: var(--border);
  color: var(--text-dim);
  flex-shrink: 0;
  margin-top: 1px;
}

.explanation {
  margin-top: 0.7rem;
  padding: 0.8rem;
  background: rgba(74,158,255,0.06);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  font-size: 0.82rem;
  color: var(--text-dim);
  display: none;
  line-height: 1.5;
}

.explanation.visible { display: block; }

.btn-validate {
  margin-top: 0.6rem;
  padding: 0.5rem 1.2rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-validate:hover { filter: brightness(1.15); }
.btn-validate:disabled { opacity: 0.4; cursor: default; }

.show-all-btn {
  padding: 0.5rem 1.2rem;
  font-size: 0.82rem;
}

.header-actions {
  display: flex;
  gap: 0.6rem;
  justify-content: center;
  margin-top: 0.8rem;
}

.reset-btn {
  background: var(--red);
}

.progress-mini {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: right;
  margin-bottom: 0.5rem;
}

.chrono-widget {
  position: absolute;
  top: 50%;
  right: 1.5rem;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
}

.chrono-display {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  color: var(--text);
}

.chrono-icon {
  font-size: 1.1rem;
  opacity: 0.7;
}

.chrono-display.running .chrono-icon {
  animation: pulse-clock 1s ease-in-out infinite;
}

@keyframes pulse-clock {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; color: var(--accent); }
}

.chrono-time {
  min-width: 5.2rem;
  text-align: left;
}

.chrono-time.idle { color: var(--text-dim); }
.chrono-time.running { color: var(--green); }
.chrono-time.stopped { color: var(--orange); }

.chrono-reset {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'Outfit', sans-serif;
  font-size: 0.65rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.chrono-reset:hover {
  border-color: var(--orange);
  color: var(--orange);
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
}

@media(max-width:640px) {
  .chrono-widget {
    position: static;
    transform: none;
    flex-direction: row;
    gap: 0.6rem;
    justify-content: center;
    margin-top: 0.5rem;
  }
  .chrono-display { font-size: 0.85rem; }
  .header h1 { font-size: 1.2rem; }
  .container { padding: 1rem; }
  .question-card { padding: 0.9rem; }
}
</style>
</head>

<div class="header">

    <div class="chrono-display" id="chronoDisplay">

  </div>

    <button class="btn-validate show-all-btn reset-btn" onclick="resetAll()">Réinitialiser tout</button>
  </div>
</div>

<div class="container">
  <div class="nav-sections" id="nav"></div>
  <div id="content"></div>
</div>

let totalQ = 0;

let correct = 0;
let wrong = 0;
let qIndex = 0;

// =================== CHRONO ===================
let chronoInterval = null;
let chronoStart = null;
let chronoState = 'idle'; // idle | running

function startChrono() {
  if (chronoState === 'running') return;
  chronoState = 'running';
  chronoStart = Date.now();
  const el = document.getElementById('chronoTime');
  const display = document.getElementById('chronoDisplay');
  el.classList.remove('idle','stopped');
  el.classList.add('running');
  display.classList.add('running');
  chronoInterval = setInterval(updateChrono, 1000);
}

function updateChrono() {
  const elapsed = Math.floor((Date.now() - chronoStart) / 1000);
  const h = String(Math.floor(elapsed / 3600)).padStart(2,'0');
  const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2,'0');
  const s = String(elapsed % 60).padStart(2,'0');
  document.getElementById('chronoTime').textContent = `${h}:${m}:${s}`;
}

function resetChrono() {
  clearInterval(chronoInterval);
  chronoInterval = null;
  chronoStart = null;
  chronoState = 'idle';
  const el = document.getElementById('chronoTime');
  const display = document.getElementById('chronoDisplay');
  el.textContent = '00:00:00';
  el.classList.remove('running','stopped');
  el.classList.add('idle');
  display.classList.remove('running');
}

    nav.appendChild(btn);
    
    // Section block
    const block = document.createElement('div');
    block.className = 'section-block';
    block.id = 'sec-' + si;

        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-${si}-${subi}-${qi}`;
        
        card.innerHTML = `
          <div class="q-number">Q${qIndex} · ${sec.section} › ${sub.title}</div>
          <div class="q-text">${q.q}</div>
          <div class="options">
            ${q.o.map((opt, oi) => `
              <div class="option" data-idx="${oi}" onclick="selectOption(${si},${subi},${qi},${oi})">
                <span class="option-letter">${String.fromCharCode(65+oi)}</span>
                <span>${opt}</span>
              </div>
            `).join('')}
          </div>
          <button class="btn-validate" onclick="validate(${si},${subi},${qi})" disabled>Valider</button>
          <div class="explanation">${q.e}</div>
        `;
        block.appendChild(card);
      });
    });
    
    content.appendChild(block);
  });
  
  document.getElementById('scoreMax').textContent = totalQ;
}

function toggleSection(si) {
  const btn = document.getElementById('nav-' + si);
  const block = document.getElementById('sec-' + si);
  const isVisible = block.classList.contains('visible');
  
  // Toggle
  if (isVisible) {
    block.classList.remove('visible');
    btn.classList.remove('active');
  } else {
    block.classList.add('visible');
    btn.classList.add('active');
    block.scrollIntoView({behavior:'smooth', block:'start'});
  }
}

function showAll() {
  DATA.forEach((_, si) => {
    document.getElementById('sec-' + si).classList.add('visible');
    document.getElementById('nav-' + si).classList.add('active');
  });
}

function selectOption(si, subi, qi, oi) {
  const card = document.getElementById(`q-${si}-${subi}-${qi}`);
  if (card.classList.contains('answered-correct') || card.classList.contains('answered-wrong')) return;
  
  // Start chrono on first interaction
  if (chronoState === 'idle') startChrono();
  
  card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  card.querySelectorAll('.option')[oi].classList.add('selected');
  card.querySelector('.btn-validate').disabled = false;
  card.dataset.selected = oi;
}

function validate(si, subi, qi) {
  const card = document.getElementById(`q-${si}-${subi}-${qi}`);
  if (card.classList.contains('answered-correct') || card.classList.contains('answered-wrong')) return;
  
  const selected = parseInt(card.dataset.selected);
  const correctIdx = DATA[si].subs[subi].questions[qi].a;
  const options = card.querySelectorAll('.option');
  
  options.forEach(o => o.classList.add('disabled'));
  options[correctIdx].classList.add('correct-answer');
  
  if (selected === correctIdx) {
    card.classList.add('answered-correct');
    correct++;
  } else {
    options[selected].classList.add('wrong-answer');
    card.classList.add('answered-wrong');
    wrong++;
  }
  
  answered++;
  card.querySelector('.explanation').classList.add('visible');
  card.querySelector('.btn-validate').disabled = true;
  
  updateScore();
}

function updateScore() {
  document.getElementById('scoreOk').textContent = correct;
  document.getElementById('scoreKo').textContent = wrong;
  document.getElementById('scoreTotal').textContent = answered;
}

function resetAll() {
  correct = 0; wrong = 0; answered = 0; totalQ = 0; qIndex = 0;
  updateScore();
  resetChrono();
  // Clear DOM
  document.getElementById('nav').innerHTML = '';
  document.getElementById('content').innerHTML = '';
  // Reshuffle and rebuild
  shuffleAll();
  init();
}

// =================== SHUFFLE ON LOAD ===================
function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function shuffleAll() {
  // Shuffle sections order
  fisherYates(DATA);
  DATA.forEach(sec => {
    // Shuffle subsections order within each section
    fisherYates(sec.subs);
    sec.subs.forEach(sub => {
      // Shuffle options within each question
      sub.questions.forEach(q => {
        const correctText = q.o[q.a];
        fisherYates(q.o);
        q.a = q.o.indexOf(correctText);
      });
      // Shuffle question order within each subsection
      fisherYates(sub.questions);
    });
  });
}

shuffleAll();
init();
</script>
